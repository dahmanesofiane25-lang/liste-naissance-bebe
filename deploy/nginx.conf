# /etc/nginx/sites-available/liste-naissance
# Remplace `liste.exemple.fr` par ton domaine

server {
    listen 80;
    server_name liste.exemple.fr;

    # Redirection HTTPS (décommenter après avoir configuré certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logs
    access_log /var/log/nginx/liste-naissance.access.log;
    error_log  /var/log/nginx/liste-naissance.error.log;
}

